<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✅ HabitFlow - 习惯养成追踪</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        
        .container { max-width: 600px; margin: 0 auto; }
        
        header { text-align: center; color: white; padding: 30px 0; }
        header h1 { font-size: 2.5rem; margin-bottom: 10px; }
        
        .card { background: white; border-radius: 20px; padding: 25px; margin-bottom: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); }
        
        .date-display { text-align: center; margin-bottom: 25px; }
        .date-day { font-size: 3rem; font-weight: bold; color: #667eea; }
        .date-weekday { color: #666; font-size: 1.1rem; }
        
        .streak-display { text-align: center; padding: 20px; background: linear-gradient(135deg, #667eea, #764ba2); border-radius: 15px; color: white; margin-bottom: 20px; }
        .streak-number { font-size: 4rem; font-weight: bold; }
        .streak-label { opacity: 0.9; }
        
        .habits-grid { display: grid; gap: 12px; }
        .habit-item { display: flex; align-items: center; gap: 15px; padding: 15px; background: #f8f9fa; border-radius: 12px; transition: all 0.3s; }
        .habit-item:hover { transform: scale(1.02); }
        .habit-item.completed { background: linear-gradient(135deg, #667eea20, #764ba220); }
        
        .habit-checkbox { width: 50px; height: 50px; border-radius: 50%; border: 3px solid #ddd; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; transition: all 0.3s; }
        .habit-checkbox.checked { background: linear-gradient(135deg, #667eea, #764ba2); border-color: #667eea; }
        
        .habit-info { flex: 1; }
        .habit-name { font-size: 1.1rem; font-weight: 500; }
        .habit-streak { color: #888; font-size: 0.85rem; }
        
        .add-habit { display: flex; gap: 10px; }
        .add-habit input { flex: 1; padding: 15px; border: 2px solid #ddd; border-radius: 10px; font-size: 1rem; }
        .add-habit input:focus { outline: none; border-color: #667eea; }
        .add-habit button { background: linear-gradient(135deg, #667eea, #764ba2); border: none; padding: 15px 25px; border-radius: 10px; color: white; font-size: 1rem; cursor: pointer; }
        
        .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .stat-box { text-align: center; padding: 15px; background: #f8f9fa; border-radius: 10px; }
        .stat-value { font-size: 1.5rem; font-weight: bold; color: #667eea; }
        .stat-label { color: #888; font-size: 0.85rem; }
        
        .weekly-view { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }
        .week-day { text-align: center; padding: 10px 5px; border-radius: 8px; background: #f8f9fa; }
        .week-day.header { background: none; font-weight: bold; color: #888; }
        .week-day.done { background: linear-gradient(135deg, #667eea, #764ba2); color: white; }
        
        .progress-ring { width: 120px; height: 120px; border-radius: 50%; background: conic-gradient(#667eea var(--progress), #ddd 0); display: flex; align-items: center; justify-content: center; margin: 0 auto; }
        .progress-inner { width: 90px; height: 90px; background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-direction: column; }
        
        .empty { text-align: center; padding: 40px; color: #888; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>✅ HabitFlow</h1>
            <p>习惯养成追踪</p>
        </header>
        
        <div class="card">
            <div class="date-display">
                <div class="date-day" id="todayDate">1</div>
                <div class="date-weekday" id="todayWeekday">周一</div>
            </div>
            
            <div class="streak-display">
                <div class="streak-number" id="currentStreak">0</div>
                <div class="streak-label">天 连续完成</div>
            </div>
            
            <div style="text-align:center;margin-bottom:20px">
                <div class="progress-ring" id="progressRing">
                    <div class="progress-inner">
                        <div style="font-size:1.5rem;font-weight:bold;color:#667eea" id="progressPercent">0%</div>
                        <div style="font-size:0.75rem;color:#888">今日进度</div>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="card">
            <h3 style="margin-bottom:15px">📋 今日习惯</h3>
            <div class="habits-grid" id="habitsList"></div>
            
            <div class="add-habit" style="margin-top:20px">
                <input type="text" id="newHabit" placeholder="添加新习惯...">
                <button onclick="addHabit()">添加</button>
            </div>
        </div>
        
        <div class="card">
            <h3 style="margin-bottom:15px">📊 本周统计</h3>
            <div class="weekly-view" id="weeklyView"></div>
        </div>
        
        <div class="card">
            <div class="stats-row">
                <div class="stat-box">
                    <div class="stat-value" id="totalHabits">0</div>
                    <div class="stat-label">习惯总数</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value" id="bestStreak">0</div>
                    <div class="stat-label">最佳连续</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value" id="totalDays">0</div>
                    <div class="stat-label">总完成天数</div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        let data = JSON.parse(localStorage.getItem('habitflow') || '{"habits":[],"history":{},"streak":0,"bestStreak":0}');
        const today = new Date().toISOString().split('T')[0];
        
        init();
        
        function init() {
            // Set date
            const now = new Date();
            document.getElementById('todayDate').textContent = now.getDate();
            const weekdays = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
            document.getElementById('todayWeekday').textContent = weekdays[now.getDay()];
            
            // Check streak
            checkStreak();
            
            // Render
            renderHabits();
            renderWeekly();
            updateStats();
        }
        
        function checkStreak() {
            const yesterday = new Date();
            yesterday.setDate(yesterday.getDate() - 1);
            const yesterdayStr = yesterday.toISOString().split('T')[0];
            
            // Get today's completed habits
            const todayCompleted = (data.history[today] || []).length;
            const totalHabits = data.habits.length;
            
            // If not all done today, check if we broke streak
            if (todayCompleted < totalHabits && totalHabits > 0) {
                const yesterdayCompleted = (data.history[yesterdayStr] || []).length;
                if (yesterdayCompleted < data.habits.length && data.habits.length > 0) {
                    data.streak = 0;
                }
            }
            
            document.getElementById('currentStreak').textContent = data.streak;
        }
        
        function renderHabits() {
            const list = document.getElementById('habitsList');
            const completed = data.history[today] || [];
            
            if (!data.habits.length) {
                list.innerHTML = '<div class="empty">还没有习惯，去添加一个吧！</div>';
                return;
            }
            
            list.innerHTML = data.habits.map((h, i) => {
                const isDone = completed.includes(h.id);
                return `
                    <div class="habit-item ${isDone ? 'completed' : ''}">
                        <div class="habit-checkbox ${isDone ? 'checked' : ''}" onclick="toggleHabit(${h.id})">
                            ${isDone ? '✓' : ''}
                        </div>
                        <div class="habit-info">
                            <div class="habit-name">${h.name}</div>
                            <div class="habit-streak">🔥 ${h.streak || 0} 天连续</div>
                        </div>
                        <button onclick="deleteHabit(${h.id})" style="background:none;border:none;font-size:1.2rem;cursor:pointer">🗑️</button>
                    </div>
                `;
            }).join('');
            
            // Update progress
            const progress = data.habits.length ? Math.round(completed.length / data.habits.length * 100) : 0;
            document.getElementById('progressRing').style.setProperty('--progress', progress + '%');
            document.getElementById('progressPercent').textContent = progress + '%';
        }
        
        function toggleHabit(id) {
            if (!data.history[today]) data.history[today] = [];
            
            const idx = data.history[today].indexOf(id);
            const habit = data.habits.find(h => h.id === id);
            
            if (idx === -1) {
                // Mark as done
                data.history[today].push(id);
                habit.streak = (habit.streak || 0) + 1;
                
                // Check if all done today
                const allDone = data.history[today].length >= data.habits.length;
                if (allDone) {
                    data.streak++;
                    if (data.streak > data.bestStreak) data.bestStreak = data.streak;
                }
            } else {
                // Unmark
                data.history[today].splice(idx, 1);
                habit.streak = Math.max(0, (habit.streak || 0) - 1);
            }
            
            localStorage.setItem('habitflow', JSON.stringify(data));
            renderHabits();
            renderWeekly();
            updateStats();
            document.getElementById('currentStreak').textContent = data.streak;
        }
        
        function addHabit() {
            const input = document.getElementById('newHabit');
            const name = input.value.trim();
            if (!name) return;
            
            data.habits.push({
                id: Date.now(),
                name: name,
                streak: 0,
                created: today
            });
            
            input.value = '';
            localStorage.setItem('habitflow', JSON.stringify(data));
            renderHabits();
            updateStats();
        }
        
        function deleteHabit(id) {
            if (!confirm('确定删除这个习惯吗？')) return;
            data.habits = data.habits.filter(h => h.id !== id);
            localStorage.setItem('habitflow', JSON.stringify(data));
            renderHabits();
            updateStats();
        }
        
        function renderWeekly() {
            const view = document.getElementById('weeklyView');
            const days = ['日', '一', '二', '三', '四', '五', '六'];
            const today = new Date();
            
            let html = days.map(d => `<div class="week-day header">${d}</div>`).join('');
            
            for (let i = 6; i >= 0; i--) {
                const d = new Date(today);
                d.setDate(d.getDate() - i);
                const dateStr = d.toISOString().split('T')[0];
                const completed = (data.history[dateStr] || []).length;
                const total = data.habits.length;
                const isDone = total > 0 && completed >= total;
                
                html += `<div class="week-day ${isDone ? 'done' : ''}">${d.getDate()}</div>`;
            }
            
            view.innerHTML = html;
        }
        
        function updateStats() {
            document.getElementById('totalHabits').textContent = data.habits.length;
            document.getElementById('bestStreak').textContent = data.bestStreak;
            
            let totalDays = 0;
            Object.values(data.history).forEach(arr => {
                if (arr.length > 0) totalDays++;
            });
            document.getElementById('totalDays').textContent = totalDays;
        }
        
        // Enter key
        document.getElementById('newHabit').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') addHabit();
        });
    </script>
</body>
</html>
